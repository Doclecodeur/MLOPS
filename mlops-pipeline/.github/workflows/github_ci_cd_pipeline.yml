name: CI/CD Pipeline - Streamlit App

env:
  DOCKER_USER: ${{ secrets.DOCKER_USER }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  REPO_NAME: ${{ secrets.REPO_NAME }}

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:

  # ─────────────────────────────────────────
  # JOB 1 : CI - Tests et qualité du code
  # ─────────────────────────────────────────
  ci_pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install black pylint pytest streamlit

      - name: Format check (black)
        run: black --check app.py

      - name: Lint (pylint)
        run: pylint --disable=R,C app.py

      - name: Test (pytest)
        run: |
          if [ -f test.py ]; then python -m pytest -vv test.py; else echo "No tests found, skipping."; fi

  # ─────────────────────────────────────────
  # JOB 2 : CD - Build et push Docker Hub
  # ─────────────────────────────────────────
  cd_dockerhub:
    runs-on: ubuntu-latest
    needs: [ci_pipeline]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set lowercase vars
        id: vars
        run: |
          echo "user=$(echo $DOCKER_USER | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          echo "repo=$(echo $REPO_NAME | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d--%H-%M-%S')" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build . --file Dockerfile \
            --tag ${{ steps.vars.outputs.user }}/${{ steps.vars.outputs.repo }}:${{ steps.date.outputs.date }} \
            --tag ${{ steps.vars.outputs.user }}/${{ steps.vars.outputs.repo }}:latest

      - name: Push to Docker Hub
        run: |
          docker push ${{ steps.vars.outputs.user }}/${{ steps.vars.outputs.repo }}:${{ steps.date.outputs.date }}
          docker push ${{ steps.vars.outputs.user }}/${{ steps.vars.outputs.repo }}:latest

